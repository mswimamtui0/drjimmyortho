version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: drjimmy_db
      POSTGRES_USER: drjimmy_user
      POSTGRES_PASSWORD: secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drjimmy_network

  redis:
    image: redis:7-alpine
    networks:
      - drjimmy_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    environment:
      DB_NAME: drjimmy_db
      DB_USER: drjimmy_user
      DB_PASSWORD: secure_password_here
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    networks:
      - drjimmy_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn drjimmy_api.wsgi:application --bind 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - drjimmy_network
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    command: npm start

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - static_files:/static
      - media_files:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - drjimmy_network

volumes:
  postgres_data:
  media_files:
  static_files:

networks:
  drjimmy_network:
    driver: bridge